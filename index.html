<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tascade</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&family=Oi&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <!-- ==========================================
             Header
        =========================================== -->

        <header class="header">

            <div class="logo">

                <h1 class="logo-text">Tascade</h1>

            </div>

            <div class="header-actions">

                <p id="current-date"></p>

                <button id="theme-toggle" aria-label="Toggle Theme">

                    <i class="fa-solid fa-moon"></i>

                </button>

            </div>

        </header>

        <!-- ==========================================
             Hero
        =========================================== -->

        <section class="hero">

            <h2 class="hero-title">

                Organize your day
                <br>
                with clarity.

            </h2>

            <p class="hero-subtitle">

                A minimalist space to plan, prioritize, and complete your daily tasks without distractions.

            </p>

        </section>

        <!-- ==========================================
             Quick Add
        =========================================== -->

        <section class="quick-add">

            <div class="section-title">

                <h3>Add a New Task</h3>

                <p>Capture your next task before you forget it.</p>

            </div>

            <form id="task-form" class="task-form">

                <div class="form-group">

                    <input id="task-title" class="input-field" type="text" placeholder="What needs to be done?"
                        autocomplete="off" required>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <select id="task-category" class="input-field">

                            <option value="Personal">Personal</option>
                            <option value="Work">Work</option>
                            <option value="Study">Study</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <select id="task-priority" class="input-field">

                            <option value="Low">Low Priority</option>
                            <option value="Medium">Medium Priority</option>
                            <option value="High">High Priority</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <input id="task-date" class="input-field" type="date">

                    </div>

                    <button class="primary-btn" type="submit">

                        <i class="fa-solid fa-plus"></i>

                        Add Task

                    </button>

                </div>

            </form>

        </section>

        <!-- ==========================================
             Stats
        =========================================== -->

        <section class="stats">

            <article class="stat-card">

                <span class="stat-label">
                    Total Tasks
                </span>

                <h3 id="total-tasks" class="stat-number">

                    0

                </h3>

            </article>

            <article class="stat-card">

                <span class="stat-label">
                    Completed
                </span>

                <h3 id="completed-tasks" class="stat-number">

                    0

                </h3>

            </article>

            <article class="stat-card">

                <span class="stat-label">
                    Progress
                </span>

                <h3 id="progress-percent" class="stat-number">

                    0%

                </h3>

            </article>

        </section>

        <!-- ==========================================
             Tasks
        =========================================== -->

        <section class="task-section">

            <div class="section-header">

                <h3>Your Tasks</h3>

                <p>Manage and track your daily progress.</p>

            </div>

            <div id="task-list"></div>

        </section>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
